# Wave Rock-Paper-Scissors: Tournament via waves
# Pattern: Random players throw RPS in parallel, coordinator eliminates until one winner
#
# 2 Hats:
# - Coordinator: Picks 2-5 players, dispatches waves, judges results, loops until winner
# - Player: Randomly throws rock, paper, or scissors
#
# Usage:
#   ralph run --hats presets/wave-rps.yml --prompt "Rock paper scissors tournament"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "rps.start"
  max_iterations: 20
  max_runtime_seconds: 300

cli:
  backend: "claude"

hats:
  coordinator:
    name: "🏟️ Coordinator"
    description: "Dispatches players, judges rounds, and loops until one winner remains."
    triggers: ["rps.start", "rps.result"]
    publishes: ["rps.throw", "LOOP_COMPLETE"]
    instructions: |
      ## ROCK-PAPER-SCISSORS TOURNAMENT COORDINATOR

      You coordinate an RPS tournament. On each activation you either start a
      new round or judge results from the previous round.

      ### When you see `rps.start` (first round)

      1. Read the prompt — it may contain player names. If it does, use those
         names. If not, invent fun names (e.g. "Thunder", "Viper", "Ghost").
      2. Pick 2-5 players (use the names from the prompt if provided)
      3. Dispatch them as a wave — each payload is the player's name:

      ```bash
      ralph wave emit rps.throw --payloads "Thunder" "Viper" "Ghost"
      ```

      Do nothing else — wait for results.

      ### When you see `rps.result` events (judging)

      Each rps.result payload is "NAME: rock/paper/scissors" (e.g. "Thunder: rock").

      1. List all throws with player names (e.g. "Thunder: rock, Viper: scissors")
      2. Determine the outcome:
         - If all throws are identical → TIE (restart with same players)
         - If all three types appear (rock + paper + scissors) → TIE (restart)
         - Otherwise one type beats another — eliminate the losers
           (rock beats scissors, scissors beats paper, paper beats rock)
      3. If exactly 1 player survives → they WIN
         - Print: "[Name] wins with [move]!"
         - Emit LOOP_COMPLETE:
         ```bash
         ralph emit LOOP_COMPLETE "[Name] wins with [move]!"
         ```
      4. If multiple survivors remain → new round with just the survivors
         - Dispatch a new wave with surviving player names:
         ```bash
         ralph wave emit rps.throw --payloads "Thunder" "Ghost"
         ```
      5. If TIE → restart with same players
         - Dispatch a new wave with all the same player names

      ### Rules
      - rock beats scissors
      - scissors beats paper
      - paper beats rock
      - Print a short summary each round (e.g. "Round 2: Thunder→rock, Viper→scissors, Ghost→paper → TIE!")

  player:
    name: "✊ Player"
    description: "Randomly throws rock, paper, or scissors."
    triggers: ["rps.throw"]
    publishes: ["rps.result"]
    concurrency: 5
    timeout: 30
    instructions: |
      You are an RPS player. Pick ONE move randomly and emit it.

      Run this exact command:

      ```bash
      ralph emit rps.result "$(shuf -e rock paper scissors -n 1)"
      ```

      Do nothing else.
