# Wave Rock-Paper-Scissors: Tournament via waves
# Pattern: Random players throw RPS in parallel, judge aggregates and eliminates until one winner
#
# 3 Hats:
# - Coordinator: Picks 2-5 players and dispatches the first round
# - Player: Randomly throws rock, paper, or scissors (parallel wave workers)
# - Judge: Aggregates all throws, eliminates losers, dispatches next round or declares winner
#
# Usage:
#   ralph run --hats presets/wave-rps.yml --prompt "Rock paper scissors tournament"

event_loop:
  completion_promise: "LOOP_COMPLETE"
  starting_event: "rps.start"
  max_iterations: 20
  max_runtime_seconds: 300

cli:
  backend: "claude"

hats:
  coordinator:
    name: "🏟️ Coordinator"
    description: "Reads the prompt and dispatches the first round of players."
    triggers: ["rps.start"]
    publishes: ["rps.throw"]
    instructions: |
      ## COORDINATOR — Dispatch First Round

      You start the RPS tournament by dispatching players.

      1. Read the prompt — it may contain player names. If it does, use those
         names. If not, invent 2-5 fun names (e.g. "Thunder", "Viper", "Ghost").
      2. Dispatch them as a wave — each payload is the player's name:

      ```bash
      ralph wave emit rps.throw --payloads "Thunder" "Viper" "Ghost"
      ```

      Do nothing else — the Judge will handle results.

  player:
    name: "✊ Player"
    description: "Randomly throws rock, paper, or scissors."
    triggers: ["rps.throw"]
    publishes: ["rps.result"]
    concurrency: 5
    timeout: 30
    instructions: |
      You are an RPS player. Your name is in the event payload above.

      Read your name from the payload, then run this exact command
      (replacing YOUR_NAME with your actual name from the payload):

      ```bash
      ralph emit rps.result "YOUR_NAME: $(shuf -e rock paper scissors -n 1)"
      ```

      For example, if your payload says "Thunder", run:
      ```bash
      ralph emit rps.result "Thunder: $(shuf -e rock paper scissors -n 1)"
      ```

      Do nothing else.

  judge:
    name: "⚖️ Judge"
    description: "Aggregates all throws from a round, eliminates losers, and dispatches next round or declares a winner."
    triggers: ["rps.result"]
    publishes: ["rps.throw", "LOOP_COMPLETE"]
    default_publishes: "LOOP_COMPLETE"
    disallowed_tools: ["Read", "Glob", "Grep", "Edit"]
    aggregate:
      mode: wait_for_all
      timeout: 60
    instructions: |
      ## JUDGE — Evaluate Round Results

      You are a pure aggregator. Your ONLY input is the rps.result events in
      PENDING EVENTS above. Do NOT read files or investigate the codebase.

      Each rps.result payload is "NAME: rock/paper/scissors" (e.g. "Thunder: rock").

      ### Process

      1. List all throws with player names (e.g. "Thunder: rock, Viper: scissors")
      2. Determine the outcome:
         - If all throws are identical → TIE (restart with same players)
         - If all three types appear (rock + paper + scissors) → TIE (restart)
         - Otherwise one type beats another — eliminate the losers
           (rock beats scissors, scissors beats paper, paper beats rock)
      3. Print a short summary (e.g. "Round: Thunder→rock, Viper→scissors, Ghost→paper → TIE!")

      ### Then act on the result:

      **If exactly 1 player survives → they WIN:**
      - Print: "🏆 [Name] wins with [move]!"
      - Emit LOOP_COMPLETE:
      ```bash
      ralph emit LOOP_COMPLETE "[Name] wins with [move]!"
      ```

      **If multiple survivors remain → new round with survivors only:**
      ```bash
      ralph wave emit rps.throw --payloads "Thunder" "Ghost"
      ```

      **If TIE → restart with all the same players:**
      ```bash
      ralph wave emit rps.throw --payloads "Thunder" "Viper" "Ghost"
      ```

      ### Rules
      - rock beats scissors
      - scissors beats paper
      - paper beats rock
